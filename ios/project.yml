name: ReverseWorld
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "3.0.0"
    CURRENT_PROJECT_VERSION: "17"
    DEVELOPMENT_TEAM: "9L6N2ZF26B"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    TARGETED_DEVICE_FAMILY: "1,2"  # R2-8: iPhone + iPad

targets:
  ReverseWorld:
    type: application
    platform: iOS
    sources:
      - path: ReverseWorld
    resources:
      - path: ReverseWorld/Assets.xcassets
      - path: ReverseWorld/PrivacyInfo.xcprivacy
    settings:
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Development"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "ReverseWorldGo App Store"
      base:
        INFOPLIST_FILE: ReverseWorld/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.ReverseWorld
        CODE_SIGN_ENTITLEMENTS: ReverseWorld/ReverseWorld.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO

  ReverseWorldTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ReverseWorldTests
    dependencies:
      - target: ReverseWorld
    settings:
      base:
        INFOPLIST_FILE: ReverseWorldTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.ReverseWorldTests
        GENERATE_INFOPLIST_FILE: YES

  ReverseWorldUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ReverseWorldUITests
    dependencies:
      - target: ReverseWorld
    settings:
      base:
        INFOPLIST_FILE: ReverseWorldUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.ReverseWorldUITests
        GENERATE_INFOPLIST_FILE: YES
